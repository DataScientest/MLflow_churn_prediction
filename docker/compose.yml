# =============================================
# compose.yml — MLOps Infrastructure
# =============================================
#
# ARTIFACT SHARING ARCHITECTURE
# ==============================
# All containers that need artifacts (mlflow-server, pipeline-runner,
# model-server) share the SAME named Docker volume: mlruns_data.
#
# The pipeline must be run INSIDE Docker (via pipeline-runner) so that
# artifacts are written directly to the shared mlruns_data volume.
# Running the pipeline on the host would write to the host filesystem,
# not to the volume — use `make docker-pipeline` or `docker-compose run pipeline-runner`.
#
# STANDARD WORKFLOW:
#   1. make infra-up          → start postgres + mlflow-server + chroma
#   2. make docker-pipeline   → run full MLOps pipeline inside Docker
#   3. make model-server-up   → start model server
#   4. curl localhost:5001/health
#
# TEARDOWN:
#   make reset                → stop everything and wipe mlruns_data volume

services:
  # ---- Backend Store ----
  postgres:
    image: postgres:15
    container_name: mlflow_postgres
    environment:
      POSTGRES_USER: mlflow
      POSTGRES_PASSWORD: mlflow
      POSTGRES_DB: mlflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mlflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---- Central MLflow Tracking Server ----
  mlflow-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: churn-prediction-env
    container_name: mlflow_server
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - mlruns_data:/mlruns
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://mlflow:mlflow@postgres:5432/mlflow
      --default-artifact-root /mlruns
      --serve-artifacts
      --workers 2
      --allowed-hosts "*"

  # ---- Pipeline Runner ----
  # Runs the full MLOps pipeline inside Docker, sharing mlruns_data with
  # the mlflow-server and model-server. Use this instead of running the
  # pipeline locally to ensure artifacts land in the shared volume.
  pipeline-runner:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: churn-prediction-env
    container_name: churn_pipeline_runner
    depends_on:
      mlflow-server:
        condition: service_started
    environment:
      MLFLOW_TRACKING_URI: http://mlflow-server:5000
    volumes:
      - mlruns_data:/mlruns
    command: python src/pipeline.py

  # ---- Model Server ----
  # Shares mlruns_data so it can read artifacts written by pipeline-runner.
  # Start this AFTER a successful pipeline run.
  model-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: churn-prediction-env
    container_name: churn_model_server
    depends_on:
      mlflow-server:
        condition: service_started
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow-server:5000
      - MLFLOW_DEPLOYMENT_FLAVOR=flask
    volumes:
      - mlruns_data:/mlruns
    ports:
      - "5001:5001"
    command: >
      mlflow models serve 
      --model-uri models:/ChurnModel@champion 
      --host 0.0.0.0 
      --port 5001 
      --no-conda

  # ---- ChromaDB (Vector DB) ----
  chroma-server:
    image: chromadb/chroma:latest
    container_name: chroma_server
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

  # ---- Agent Service ----
  agent-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: churn-prediction-env
    container_name: agent_service
    depends_on:
      mlflow-server:
        condition: service_started
      chroma-server:
        condition: service_started
    environment:
      MLFLOW_TRACKING_URI: http://mlflow-server:5000
      CHROMA_HOST: chroma-server
      CHROMA_PORT: 8000
      MODEL_SERVER_URL: http://model-server:5001/invocations
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    ports:
      - "8080:8080"
    command: python src/llm/agent.py --serve
    

  # ---- Agent Evaluator ----
  agent-evaluator:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: churn-prediction-env
    container_name: retention_agent_evaluator
    depends_on:
      mlflow-server:
        condition: service_started
      chroma-server:
        condition: service_started
    environment:
      MLFLOW_TRACKING_URI: http://mlflow-server:5000
      CHROMA_HOST: chroma-server
      CHROMA_PORT: 8000
      MODEL_SERVER_URL: http://model-server:5001/invocations
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    command: python src/llm/evaluate_agent.py

volumes:
  postgres_data:
  mlruns_data:
  chroma_data:
